name: deploy-digitalocean

on:
  push:
    tags:
      - "v*"
      - "sdk-v*"
  # Manual redeploy without pushing a tag — pick which app from the UI.
  workflow_dispatch:
    inputs:
      target:
        description: "Which app to redeploy"
        required: true
        default: "both"
        type: choice
        options: [both, optimizer, indexer]

concurrency:
  group: deploy-do-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: redeploy DO apps
    runs-on: ubuntu-latest
    # sdk-v* tags publish npm packages, not server services. Skip the DO
    # redeploy unless the tag is a `v*` product tag.
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Resolve app IDs
        id: apps
        env:
          DO_APP_OPTIMIZER_ID: ${{ vars.DO_APP_OPTIMIZER_ID }}
          DO_APP_INDEXER_ID: ${{ vars.DO_APP_INDEXER_ID }}
        run: |
          set -euo pipefail

          resolve() {
            local want="$1" preset="$2"
            if [[ -n "$preset" ]]; then echo "$preset"; return; fi
            # Fallback: look up by name in `doctl apps list`
            doctl apps list --format ID,Spec.Name --no-header \
              | awk -v w="$want" '$2 == w { print $1 }' \
              | head -n1
          }

          OPT=$(resolve yieldfy-optimizer "$DO_APP_OPTIMIZER_ID")
          IDX=$(resolve yieldfy-wxrp-indexer "$DO_APP_INDEXER_ID")

          if [[ -z "$OPT" ]]; then
            echo "::error::yieldfy-optimizer app not found. Create it first per ops/DEPLOY-PRODUCTION.md."
            exit 1
          fi
          if [[ -z "$IDX" ]]; then
            echo "::error::yieldfy-wxrp-indexer app not found. Create it first per ops/DEPLOY-PRODUCTION.md."
            exit 1
          fi

          echo "optimizer=$OPT" >> "$GITHUB_OUTPUT"
          echo "indexer=$IDX" >> "$GITHUB_OUTPUT"
          echo "resolved: optimizer=$OPT indexer=$IDX"

      - name: Update optimizer spec
        if: >
          github.event_name == 'push' ||
          github.event.inputs.target == 'both' ||
          github.event.inputs.target == 'optimizer'
        run: |
          doctl apps update ${{ steps.apps.outputs.optimizer }} \
            --spec .do/optimizer.app.yaml --wait

      - name: Trigger optimizer redeploy
        if: >
          github.event_name == 'push' ||
          github.event.inputs.target == 'both' ||
          github.event.inputs.target == 'optimizer'
        run: |
          doctl apps create-deployment ${{ steps.apps.outputs.optimizer }} --wait

      - name: Update indexer spec
        if: >
          github.event_name == 'push' ||
          github.event.inputs.target == 'both' ||
          github.event.inputs.target == 'indexer'
        run: |
          doctl apps update ${{ steps.apps.outputs.indexer }} \
            --spec .do/wxrp-indexer.app.yaml --wait

      - name: Trigger indexer redeploy
        if: >
          github.event_name == 'push' ||
          github.event.inputs.target == 'both' ||
          github.event.inputs.target == 'indexer'
        run: |
          doctl apps create-deployment ${{ steps.apps.outputs.indexer }} --wait

      - name: Post-deploy smoke tests
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          sleep 10
          echo "optimizer /health:"
          curl -fsS https://optimizer.yieldfy.ai/health
          echo
          echo "optimizer /attestor/pubkey:"
          curl -fsS https://optimizer.yieldfy.ai/attestor/pubkey
          echo
          echo "indexer /health:"
          curl -fsS https://indexer.yieldfy.ai/health

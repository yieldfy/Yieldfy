name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dashboard:
    name: dashboard · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: build sdk (dashboard consumes @yieldfy/sdk)
        run: npm -w @yieldfy/sdk run build
      - name: lint
        run: npm -w @yieldfy/dashboard run lint
        continue-on-error: true # pre-existing shadcn warnings — track in follow-up
      - name: test
        run: npm -w @yieldfy/dashboard run test
      - name: build
        run: npm -w @yieldfy/dashboard run build

  optimizer:
    name: optimizer · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/optimizer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/optimizer/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  sdk:
    name: sdk · build · pack (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm -w @yieldfy/sdk run test
      - run: npm -w @yieldfy/sdk run build
      - name: pack dry-run
        run: npm -w @yieldfy/sdk pack --dry-run

  wxrp-indexer:
    name: wxrp-indexer · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm -w @yieldfy/wxrp-indexer run test
      - run: npm -w @yieldfy/wxrp-indexer run build
